<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医生审查门户 - 处方审查系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #4f46e5;
            font-size: 2rem;
            font-weight: 700;
        }

        .doctor-info {
            text-align: right;
        }

        .doctor-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
        }

        .doctor-speciality {
            font-size: 0.9rem;
            color: #666;
            margin-top: 4px;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #4f46e5;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 8px;
        }

        .main-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #f1f5f9;
            margin-bottom: 30px;
        }

        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1rem;
            color: #64748b;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab.active {
            color: #4f46e5;
            border-bottom-color: #4f46e5;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .prescription-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .prescription-card {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .prescription-card:hover {
            border-color: #4f46e5;
            box-shadow: 0 5px 15px rgba(79, 70, 229, 0.1);
        }

        .prescription-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 15px;
        }

        .patient-info {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .prescription-date {
            color: #64748b;
            font-size: 0.9rem;
        }

        .prescription-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-pending {
            background: #fef3c7;
            color: #d97706;
        }

        .status-reviewing {
            background: #dbeafe;
            color: #2563eb;
        }

        .symptoms {
            color: #4b5563;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .prescription-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #4f46e5;
            color: white;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 15px;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f2937;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #6b7280;
        }

        .prescription-detail {
            background: #f8fafc;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .prescription-edit {
            width: 100%;
            min-height: 200px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }

        .form-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }

        .error {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .success {
            background: #dcfce7;
            border: 1px solid #bbf7d0;
            color: #166534;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }

            .stats-cards {
                grid-template-columns: repeat(2, 1fr);
            }

            .prescription-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🏥 医生审查门户</h1>
                <div id="loginPrompt" style="display: none;">
                    <p>请先登录以访问处方审查功能</p>
                    <button class="btn btn-primary" onclick="showLoginModal()">医生登录</button>
                </div>
            </div>
            <div class="doctor-info" id="doctorInfo" style="display: none;">
                <div class="doctor-name" id="doctorName">张仲景</div>
                <div class="doctor-speciality" id="doctorSpeciality">伤寒杂病科</div>
                <button class="btn btn-secondary" onclick="logout()" style="margin-top: 10px;">退出登录</button>
            </div>
        </div>

        <div id="statsCards" class="stats-cards" style="display: none;">
            <div class="stat-card">
                <div class="stat-number" id="totalReviewed">0</div>
                <div class="stat-label">总审查数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="todayReviewed">0</div>
                <div class="stat-label">今日审查</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="approved">0</div>
                <div class="stat-label">已批准</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="rejected">0</div>
                <div class="stat-label">已拒绝</div>
            </div>
        </div>

        <div class="main-content" id="mainContent" style="display: none;">
            <div class="tabs">
                <button class="tab active" onclick="showTab('pending')">待审查</button>
                <button class="tab" onclick="showTab('completed')">已完成</button>
            </div>

            <div id="pendingTab" class="tab-content active">
                <div id="prescriptionList" class="prescription-list">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <div id="completedTab" class="tab-content">
                <div id="completedList" class="prescription-list">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 登录模态框 -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">医生登录</h3>
                <button class="close-btn" onclick="closeModal('loginModal')">&times;</button>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">执业证号</label>
                    <input type="text" id="licenseNo" class="form-input" placeholder="请输入执业证号" required>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" id="password" class="form-input" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">登录</button>
            </form>
        </div>
    </div>

    <!-- 处方详情模态框 -->
    <div id="prescriptionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">处方详情审查</h3>
                <button class="close-btn" onclick="closeModal('prescriptionModal')">&times;</button>
            </div>
            <div id="prescriptionDetail">
                <!-- 处方详情内容将在这里动态加载 -->
            </div>
        </div>
    </div>

    <script>
        // 全局状态
        let currentDoctor = null;
        let authToken = null;
        let currentPrescriptions = [];

        // 页面加载时检查登录状态
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('doctorAuthToken');
            if (token) {
                verifyTokenAndLoadDashboard(token);
            } else {
                showLoginPrompt();
            }
        });

        // 显示登录提示
        function showLoginPrompt() {
            document.getElementById('loginPrompt').style.display = 'block';
            document.getElementById('doctorInfo').style.display = 'none';
            document.getElementById('statsCards').style.display = 'none';
            document.getElementById('mainContent').style.display = 'none';
        }

        // 验证令牌并加载仪表板
        async function verifyTokenAndLoadDashboard(token) {
            try {
                const response = await fetch('/api/doctor/profile', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    currentDoctor = data.doctor;
                    authToken = token;
                    loadDashboard();
                } else {
                    localStorage.removeItem('doctorAuthToken');
                    showLoginPrompt();
                }
            } catch (error) {
                console.error('验证令牌失败:', error);
                showLoginPrompt();
            }
        }

        // 加载医生仪表板
        function loadDashboard() {
            // 显示医生信息
            document.getElementById('doctorName').textContent = currentDoctor.name;
            document.getElementById('doctorSpeciality').textContent = currentDoctor.speciality || '中医科';
            
            // 显示界面元素
            document.getElementById('loginPrompt').style.display = 'none';
            document.getElementById('doctorInfo').style.display = 'block';
            document.getElementById('statsCards').style.display = 'grid';
            document.getElementById('mainContent').style.display = 'block';

            // 加载统计数据和处方列表
            loadStatistics();
            loadPendingPrescriptions();
        }

        // 显示登录模态框
        function showLoginModal() {
            document.getElementById('loginModal').style.display = 'block';
        }

        // 关闭模态框
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // 处理登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const licenseNo = document.getElementById('licenseNo').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/doctor/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        license_no: licenseNo,
                        password: password
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('doctorAuthToken', data.doctor.auth_token);
                    currentDoctor = data.doctor;
                    authToken = data.doctor.auth_token;
                    
                    closeModal('loginModal');
                    loadDashboard();
                    
                    showMessage('登录成功！', 'success');
                } else {
                    showMessage(data.detail || '登录失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
            }
        });

        // 退出登录
        function logout() {
            localStorage.removeItem('doctorAuthToken');
            currentDoctor = null;
            authToken = null;
            showLoginPrompt();
            showMessage('已退出登录', 'success');
        }

        // 加载统计数据
        async function loadStatistics() {
            try {
                const response = await fetch('/api/doctor/statistics', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    const stats = data.statistics;
                    
                    document.getElementById('totalReviewed').textContent = stats.total_reviewed;
                    document.getElementById('todayReviewed').textContent = stats.today_reviewed;
                    document.getElementById('approved').textContent = stats.approved;
                    document.getElementById('rejected').textContent = stats.rejected;
                }
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }

        // 加载待审查处方列表
        async function loadPendingPrescriptions() {
            try {
                const response = await fetch('/api/doctor/pending-prescriptions', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    currentPrescriptions = data.prescriptions;
                    displayPrescriptions(data.prescriptions, 'prescriptionList');
                }
            } catch (error) {
                console.error('加载处方列表失败:', error);
                document.getElementById('prescriptionList').innerHTML = 
                    '<div class="error">加载处方列表失败，请刷新重试</div>';
            }
        }

        // 显示处方列表
        function displayPrescriptions(prescriptions, containerId) {
            const container = document.getElementById(containerId);
            
            if (prescriptions.length === 0) {
                container.innerHTML = '<div class="loading">暂无待审查处方</div>';
                return;
            }

            container.innerHTML = prescriptions.map(prescription => `
                <div class="prescription-card" onclick="viewPrescriptionDetail(${prescription.id})">
                    <div class="prescription-header">
                        <div>
                            <div class="patient-info">
                                ${prescription.patient_name || prescription.patient_id} 
                                ${prescription.patient_phone ? `(${prescription.patient_phone})` : ''}
                            </div>
                            <div class="prescription-date">
                                ${new Date(prescription.created_at).toLocaleString('zh-CN')}
                            </div>
                        </div>
                        <div class="prescription-status status-${prescription.status}">
                            ${getStatusText(prescription.status)}
                        </div>
                    </div>
                    <div class="symptoms">
                        <strong>症状：</strong>${prescription.symptoms || '无具体症状描述'}
                    </div>
                    <div class="prescription-actions">
                        <button class="btn btn-primary" onclick="event.stopPropagation(); viewPrescriptionDetail(${prescription.id})">
                            详细审查
                        </button>
                        <button class="btn btn-success" onclick="event.stopPropagation(); quickApprove(${prescription.id})">
                            快速批准
                        </button>
                        <button class="btn btn-danger" onclick="event.stopPropagation(); quickReject(${prescription.id})">
                            拒绝
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // 获取状态文本
        function getStatusText(status) {
            const statusMap = {
                'pending': '待审查',
                'doctor_reviewing': '审查中',
                'approved': '已批准',
                'rejected': '已拒绝'
            };
            return statusMap[status] || status;
        }

        // 查看处方详情
        async function viewPrescriptionDetail(prescription_id) {
            try {
                const response = await fetch(`/api/doctor/prescription/${prescription_id}`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    showPrescriptionDetailModal(data.prescription);
                }
            } catch (error) {
                showMessage('加载处方详情失败', 'error');
            }
        }

        // 显示处方详情模态框
        function showPrescriptionDetailModal(prescription) {
            const detailContainer = document.getElementById('prescriptionDetail');
            
            detailContainer.innerHTML = `
                <div class="form-group">
                    <label class="form-label">患者信息</label>
                    <div class="prescription-detail">
                        姓名：${prescription.patient_name || prescription.patient_id}<br>
                        电话：${prescription.patient_phone || '未提供'}<br>
                        创建时间：${new Date(prescription.created_at).toLocaleString('zh-CN')}
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">症状描述</label>
                    <div class="prescription-detail">
                        ${prescription.symptoms || '无具体症状描述'}
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">AI诊断和处方</label>
                    <div class="prescription-detail">
                        ${prescription.ai_prescription.replace(/\n/g, '<br>')}
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">医生处方调整</label>
                    <textarea id="doctorPrescription" class="prescription-edit" placeholder="在此输入调整后的处方，留空表示同意AI处方...">${prescription.doctor_prescription || ''}</textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">审查意见</label>
                    <input type="text" id="doctorNotes" class="form-input" placeholder="请输入审查意见（可选）" value="${prescription.doctor_notes || ''}">
                </div>

                <div class="prescription-actions">
                    <button class="btn btn-success" onclick="reviewPrescription(${prescription.id}, 'approve')">
                        ✅ 批准处方
                    </button>
                    <button class="btn btn-primary" onclick="reviewPrescription(${prescription.id}, 'modify')">
                        ✏️ 修改并批准
                    </button>
                    <button class="btn btn-danger" onclick="reviewPrescription(${prescription.id}, 'reject')">
                        ❌ 拒绝处方
                    </button>
                </div>
            `;

            document.getElementById('prescriptionModal').style.display = 'block';
        }

        // 审查处方
        async function reviewPrescription(prescription_id, action) {
            const doctorPrescription = document.getElementById('doctorPrescription')?.value || '';
            const doctorNotes = document.getElementById('doctorNotes')?.value || '';

            try {
                const response = await fetch(`/api/doctor/prescription/${prescription_id}/review`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        action: action,
                        doctor_prescription: doctorPrescription,
                        doctor_notes: doctorNotes
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    showMessage(data.message, 'success');
                    closeModal('prescriptionModal');
                    loadPendingPrescriptions();
                    loadStatistics();
                } else {
                    showMessage(data.detail || '审查失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
            }
        }

        // 快速批准
        async function quickApprove(prescription_id) {
            if (confirm('确认快速批准此处方吗？')) {
                await reviewPrescription(prescription_id, 'approve');
            }
        }

        // 快速拒绝
        async function quickReject(prescription_id) {
            const reason = prompt('请输入拒绝原因：');
            if (reason) {
                try {
                    const response = await fetch(`/api/doctor/prescription/${prescription_id}/review`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${authToken}`
                        },
                        body: JSON.stringify({
                            action: 'reject',
                            doctor_notes: reason
                        })
                    });

                    const data = await response.json();
                    
                    if (response.ok) {
                        showMessage('处方已拒绝', 'success');
                        loadPendingPrescriptions();
                        loadStatistics();
                    } else {
                        showMessage(data.detail || '操作失败', 'error');
                    }
                } catch (error) {
                    showMessage('网络错误，请稍后重试', 'error');
                }
            }
        }

        // 切换标签页
        function showTab(tabName) {
            // 更新标签按钮状态
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            // 显示对应内容
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tabName + 'Tab').classList.add('active');

            // 加载对应数据
            if (tabName === 'completed') {
                // 这里可以加载已完成的处方
                document.getElementById('completedList').innerHTML = '<div class="loading">功能开发中...</div>';
            }
        }

        // 显示消息
        function showMessage(message, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = type;
            messageDiv.textContent = message;
            messageDiv.style.position = 'fixed';
            messageDiv.style.top = '20px';
            messageDiv.style.right = '20px';
            messageDiv.style.zIndex = '9999';
            messageDiv.style.padding = '12px 20px';
            messageDiv.style.borderRadius = '8px';
            messageDiv.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
            
            document.body.appendChild(messageDiv);
            
            setTimeout(() => {
                messageDiv.remove();
            }, 3000);
        }

        // 点击模态框外部关闭
        window.onclick = function(event) {
            const modals = document.querySelectorAll('.modal');
            modals.forEach(modal => {
                if (event.target === modal) {
                    modal.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
